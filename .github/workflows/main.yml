name: Build Applications

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Windows
      if: runner.os == 'Windows'
      run: pyinstaller app.py --name "おまかせ三色" --noconsole --onefile --icon=icon.ico

    - name: Build macOS
      if: runner.os == 'macOS'
      run: pyinstaller app.py --name "おまかせ三色" --noconsole --onefile --windowed --icon=icon.icns

    - name: Build Linux
      if: runner.os == 'Linux'
      run: pyinstaller app.py --name "おまかせ三色" --noconsole --onefile

    # 完成品のアップロード
    - name: Upload Artifact (Windows)
      if: runner.os == 'Windows'
      uses: actions/upload-artifact@v4
      with:
        name: おまかせ三色-Windows
        path: dist/おまかせ三色.exe

    - name: Upload Artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: おまかせ三色-macOS
        path: dist/おまかせ三色.app

    - name: Upload Artifact (Linux)
      if: runner.os == 'Linux'
      uses: actions/upload-artifact@v4
      with:
        name: おまかせ三色-Linux
        path: dist/おまかせ三色
